.kdate{font-weight:700;color:var(--navy);font-size:14px;margin-bottom:14px}
.ktable{width:100%;border-collapse:collapse;margin-bottom:22px}
.ktable th{background:var(--navy);color:#fff;padding:11px 14px;font-size:13px;text-align:left}
.ktable td{padding:11px 14px;border-bottom:1px solid #f0f0f0;font-size:13px}
.ktable tr:last-child td{border-bottom:none}
.ktable td:first-child{font-weight:600;color:var(--navy);white-space:nowrap}
.kbtn{display:inline-block;background:#FEE500;color:#000;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700}
.kbtn:hover{background:#f0d800}

#business{padding:72px 28px;background:#fff}
.bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:22px}
.bcard{border-radius:12px;overflow:hidden;box-shadow:0 2px 14px rgba(0,0,0,.07);transition:.3s}
.bcard:hover{box-shadow:0 8px 28px rgba(0,0,0,.12);transform:translateY(-4px)}
.bcard img{width:100%;height:170px;object-fit:cover}
.bbody{padding:18px}
.btitle{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:7px}
.bdesc{font-size:13px;color:#666;line-height:1.7}

#welfare{padding:72px 28px;background:#f0f4f8}
.wimg{text-align:center;margin-bottom:36px}
.wimg img{max-width:100%;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.wcats{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px;margin-bottom:28px}
.wcat{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.05)}
.wcname{font-size:13px;font-weight:800;color:var(--navy);margin-bottom:10px}
.wctags{display:flex;flex-wrap:wrap;gap:5px}
.wctag{font-size:11px;color:#555;padding:3px 9px;background:#f0f4ff;border-radius:20px}

#culture{padding:72px 28px;background:#fff;text-align:center}
#culture img{max-width:100%;border-radius:12px}

#videos{padding:72px 28px;background:var(--navy)}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
.vcard{border-radius:11px;overflow:hidden;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);transition:.3s}
.vcard:hover{transform:translateY(-4px);background:rgba(255,255,255,.1)}
.vcard a{display:block;text-decoration:none}
.vcard img{width:100%;height:150px;object-fit:cover}
.vtitle{padding:13px 14px;font-size:13px;font-weight:700;color:#fff}

#faq{padding:72px 28px;background:var(--bg)}
.ftabs{display:flex;gap:7px;margin-bottom:22px;flex-wrap:wrap}
.ftab{padding:7px 18px;border:1.5px solid #d0d0d0;border-radius:20px;cursor:pointer;font-size:13px;background:#fff;color:#555;transition:.2s;font-weight:500}
.ftab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.fpane{display:none}.fpane.active{display:block}
.fitem{background:#fff;border-radius:7px;margin-bottom:7px;border:1px solid #e8e8e8;overflow:hidden}
.fq{padding:14px 18px;font-size:14px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:.2s}
.fq:hover{background:#f5f7ff}
.fq::after{content:'▼';font-size:11px;color:#999;transition:.3s;flex-shrink:0;margin-left:8px}
.fitem.open .fq::after{transform:rotate(180deg)}
.fa{padding:0 18px;max-height:0;overflow:hidden;transition:.35s;font-size:13px;color:#555;line-height:1.8}
.fitem.open .fa{max-height:400px;padding:13px 18px}
.fcontact{text-align:center;margin-top:24px;padding:18px;background:#fff;border-radius:8px;border:1px solid #e8e8e8;font-size:14px;color:#555}
.fcontact a{color:var(--blue);font-weight:600}

#gift{padding:72px 28px;background:linear-gradient(135deg,var(--navy),#0d3060);text-align:center}
.gdesc{color:rgba(255,255,255,.85);font-size:15px;line-height:1.9;margin-bottom:24px}
.gitems{display:flex;justify-content:center;gap:14px;margin:14px 0 26px;flex-wrap:wrap}
.gitem{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:10px;padding:16px 20px;color:#fff;font-size:13px;font-weight:600}
.gbtn{display:inline-block;background:var(--gold);color:#fff;text-decoration:none;padding:14px 38px;border-radius:50px;font-size:15px;font-weight:700;transition:.3s;box-shadow:0 6px 22px rgba(0,0,0,.3)}
.gbtn:hover{transform:translateY(-3px);background:#b8943e}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto}
.overlay.open{display:flex}
.popup{background:#fff;border-radius:14px;max-width:780px;width:100%;margin:auto}
.phdr{position:sticky;top:0;background:#fff;padding:18px 24px 12px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;border-radius:14px 14px 0 0}
.phtitle{font-size:16px;font-weight:800;color:var(--navy)}
.pclose{background:none;border:none;font-size:22px;cursor:pointer;color:#aaa;line-height:1}
.pclose:hover{color:#333}
.pbody{padding:22px 24px}
.ptabs{display:flex;gap:5px;margin-bottom:20px;flex-wrap:wrap}
.ptab{padding:6px 14px;border:1px solid #ddd;border-radius:20px;cursor:pointer;font-size:13px;background:#fff;color:#666;transition:.2s}
.ptab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.ppane{display:none}.ppane.active{display:block}
.ptags{color:var(--gold);font-size:13px;font-weight:600;margin-bottom:9px}
.pdesc{color:#555;font-size:14px;line-height:1.9;margin-bottom:18px}
.duties{display:flex;flex-direction:column;gap:9px}
.duty{background:#f8f9fb;border-left:3px solid var(--navy);padding:11px 14px;border-radius:0 7px 7px 0}
.dtitle{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px}
.ddesc{font-size:12px;color:#666;line-height:1.6}
.iqa{margin-bottom:16px}
.iq{font-size:14px;font-weight:700;color:var(--navy);padding:11px 14px;background:#f0f4ff;border-left:3px solid var(--navy);border-radius:6px 6px 0 0}
.ia{font-size:13px;color:#555;line-height:1.8;padding:11px 14px;background:#fafbfc;border:1px solid #e8e8e8;border-top:none;border-radius:0 0 6px 6px}

.tc{text-align:center}
.gold{color:var(--gold)}
.navy{color:var(--navy)}
.white{color:#fff}
@media(max-width:768px){
  .nav-links{display:none}.burger{display:flex}
  .cgrid,.bgrid,.jobs-grid,.wcats,.vgrid{grid-template-columns:1fr}
  .info-box{grid-template-columns:1fr}
  .info-col{border-right:none;border-bottom:1px solid #e0e0e0}
  .info-col:last-child{border-bottom:none}
  .sgrid{grid-template-columns:1fr 1fr}
  .steps{gap:2px}.step::after{display:none}
}
</style>
</head>

    <div class="sh tc"><div class="sub gold">조직문화</div><div class="ttl navy">조직문화</div></div>

</div>

    <div class="pbody"><div class="ptabs" id="iv-tabs"></div><div id="iv-panes"></div></div>
  </div>
</div>

<script>
function toggleMenu(){document.getElementById('mmenu').classList.toggle('open')}
function closeP(id){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}
function closeOv(e,id){if(e.target===document.getElementById(id))closeP(id)}
function openP(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden'}

function switchTab(prefix,i){
  document.querySelectorAll('#'+prefix+'-tabs .ptab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('#'+prefix+'-panes .ppane').forEach((p,j)=>p.classList.toggle('active',j===i));
}
function switchFaq(i){
  document.querySelectorAll('#ftabs .ftab').forEach((t,j)=>t.classList.toggle('active',j===i));
  document.querySelectorAll('#fpanes .fpane').forEach((p,j)=>p.classList.toggle('active',j===i));
}
function toggleFaq(el){el.closest('.fitem').classList.toggle('open')}

function nl(s){return(s||'').replace(/\n/g,'<br>')}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function render(){
  const D=getSiteData();

  // NAV
  const nl_=D.nav||[];
  document.getElementById('nav-links').innerHTML=nl_.map(n=>`<a href="${esc(n.url)}" class="${n.isCta?'cta':''}" ${(n.url||'').startsWith('http')?'target="_blank"':''}>${esc(n.name)}</a>`).join('');
  document.getElementById('mmenu').innerHTML=nl_.map(n=>`<a href="${esc(n.url)}" ${(n.url||'').startsWith('http')?'target="_blank"':''}>${esc(n.name)}</a>`).join('');

  // HERO
  const h=D.hero||{};
  document.getElementById('h-slogan').textContent=h.slogan||'';
  document.getElementById('h-title').textContent=h.title||'';
  document.getElementById('h-period').textContent=h.period||'';
  const cta=document.getElementById('h-cta');
  cta.textContent=h.btnText||''; cta.href=h.btnUrl||'#';

  // INFO
  const inf=D.info||{};
  document.getElementById('info-cols').innerHTML=`
    <div class="info-col"><div class="info-lbl">주요 직군</div><div class="info-val">${nl(inf.jobs)}</div></div>
    <div class="info-col"><div class="info-lbl">지원 자격</div><div class="info-val">${nl(inf.qual)}</div></div>
    <div class="info-col"><div class="info-lbl">지원 방법</div><div class="info-val">${nl(inf.method)}<br><a href="${esc(inf.applyUrl||'#')}" class="ibtn" target="_blank">지원하기</a></div></div>`;

  // PROCESS
  document.getElementById('steps').innerHTML=(D.process||[]).map((s,i)=>`
    <div class="step"><div class="sn">${i+1}</div><div class="st">${nl(s)}</div></div>`).join('');

  // JOBS
  const jobs=D.jobs||[];
  document.getElementById('jgrid').innerHTML=jobs.map((j,i)=>`
    <div class="jcard">
      <div class="jname">${esc(j.name)}</div>
      <div class="jbtns">
        <button class="jbtn d" onclick="openJobP(${i})">📁 직군 상세</button>
        <button class="jbtn i" onclick="openIvP(${i})">🖊️ 직무인터뷰</button>
        ${j.videoUrl?`<a href="${esc(j.videoUrl)}" class="jbtn v" target="_blank">▶ 영상 보러가기</a>`:''}
      </div>
    </div>`).join('');

  // JOB POPUPS
  const jps=D.jobPopups||[];
  document.getElementById('jp-tabs').innerHTML=jps.map((j,i)=>`<div class="ptab${i===0?' active':''}" onclick="switchTab('jp',${i})">${esc(j.name)}</div>`).join('');
  document.getElementById('jp-panes').innerHTML=jps.map((j,i)=>`
    <div class="ppane${i===0?' active':''}">
      <div class="ptags">${esc(j.tags||'')}</div>
      <div class="pdesc">${esc(j.desc||'')}</div>
      <div class="duties">${(j.duties||[]).map(d=>`<div class="duty"><div class="dtitle">${esc(d.title)}</div><div class="ddesc">${esc(d.desc)}</div></div>`).join('')}</div>
    </div>`).join('');

  // INTERVIEW POPUPS
  const ivs=D.interviewPopups||[];
  document.getElementById('iv-tabs').innerHTML=ivs.map((v,i)=>`<div class="ptab${i===0?' active':''}" onclick="switchTab('iv',${i})">${esc(v.name)}</div>`).join('');
  document.getElementById('iv-panes').innerHTML=ivs.map((v,i)=>`
    <div class="ppane${i===0?' active':''}">
      ${(v.qaList||[]).map(qa=>`<div class="iqa"><div class="iq">${esc(qa.q)}</div><div class="ia">${esc(qa.a)}</div></div>`).join('')}
    </div>`).join('');

  // CAMPUS
  const ca=D.campus||{};
  document.getElementById('c-sub').textContent=ca.subtitle||'';
  document.getElementById('c-title').textContent=ca.title||'';
  document.getElementById('cgrid').innerHTML=(ca.events||[]).map(ev=>`
    <div class="cgroup">
      <div class="dbadge">${esc(ev.date)}</div>
      ${(ev.items||[]).map(it=>`<div class="crow"><div><div class="cs">${esc(it.school)}</div><div class="cl">${esc(it.location)}</div></div><div class="ct">${esc(it.time)}</div></div>`).join('')}
    </div>`).join('');
  document.getElementById('c-notice').innerHTML=`<strong>참석자 전원에게 맛있는 점심을 제공합니다</strong><br><br><strong>신청 가능 대상 :</strong> ${esc(ca.target||'')}`;
  document.getElementById('c-btn').href=ca.applyUrl||'#';

  // OFFLINE
  const of=D.offline||{};
  document.getElementById('o-sub').textContent=of.subtitle||'';
  document.getElementById('o-title').textContent=of.title||'';
  document.getElementById('oweeks').innerHTML=(of.weeks||[]).map(wk=>`
    <div class="oweek">
      <div class="whdr">${esc(wk.dates)}</div>
      <div class="sgrid">${(wk.schools||[]).map(s=>`<div class="scard"><div class="sname">${esc(s.name)}</div><div class="sloc">${esc(s.location)}</div></div>`).join('')}</div>
    </div>`).join('');

  // ONLINE
  const on=D.online||{};
  document.getElementById('on-sub').textContent=on.subtitle||'';
  document.getElementById('on-title').textContent=on.title||'';
  document.getElementById('on-desc').innerHTML=nl(on.desc||'');
  document.getElementById('on-date').textContent=on.date||'';
  const obtn=document.getElementById('on-btn'); obtn.textContent=on.btnText||''; obtn.href=on.url||'#';

  // KAKAO
  const ka=D.kakao||{};
  document.getElementById('k-sub').textContent=ka.subtitle||'';
  document.getElementById('k-title').textContent=ka.title||'';
  document.getElementById('k-desc').textContent=ka.desc||'';
  document.getElementById('k-date').textContent=ka.date||'';
  document.getElementById('k-tbody').innerHTML=(ka.schedule||[]).map(s=>`<tr><td>${esc(s.time)}</td><td>${esc(s.jobs)}</td></tr>`).join('');
  document.getElementById('k-btn').href=ka.url||'#';

  // BUSINESS
  document.getElementById('bgrid').innerHTML=(D.business||[]).map(b=>`
    <div class="bcard">
      <img src="${esc(b.imgUrl||'')}" alt="${esc(b.title||'')}">
      <div class="bbody"><div class="btitle">${esc(b.title)}</div><div class="bdesc">${esc(b.desc)}</div></div>
    </div>`).join('');

  // WELFARE
  const wf=D.welfare||{};
  document.getElementById('w-img').src=wf.imgUrl||'';
  document.getElementById('cu-img').src=wf.cultureImgUrl||'';
  document.getElementById('w-review').href=wf.reviewUrl||'#';
  document.getElementById('wcats').innerHTML=(wf.cats||[]).map(c=>`
    <div class="wcat">
      <div class="wcname">${esc(c.name)}</div>
      <div class="wctags">${(c.items||'').split(',').map(t=>`<span class="wctag">${esc(t.trim())}</span>`).join('')}</div>
    </div>`).join('');

  // VIDEOS
  document.getElementById('vgrid').innerHTML=(D.videos||[]).map(v=>`
    <div class="vcard"><a href="${esc(v.url)}" target="_blank"><img src="${esc(v.thumb||'')}" alt="${esc(v.title||'')}"><div class="vtitle">${esc(v.title)}</div></a></div>`).join('');

  // FAQ
  const faq=D.faq||{};
  document.getElementById('femail').href='mailto:'+esc(faq.email||'');
  document.getElementById('femail').textContent=faq.email||'';
  const cats=faq.categories||[];
  document.getElementById('ftabs').innerHTML=cats.map((c,i)=>`<div class="ftab${i===0?' active':''}" onclick="switchFaq(${i})">${esc(c.name)}</div>`).join('');
  document.getElementById('fpanes').innerHTML=cats.map((c,i)=>`
    <div class="fpane${i===0?' active':''}">
      ${(c.items||[]).map(it=>`<div class="fitem"><div class="fq" onclick="toggleFaq(this)">${esc(it.q)}</div><div class="fa">${esc(it.a)}</div></div>`).join('')}
    </div>`).join('');

  // GIFT
  const gi=D.gift||{};
  document.getElementById('g-desc').innerHTML=nl(gi.desc||'');
  document.getElementById('g-items').innerHTML=(gi.items||[]).map(it=>`<div class="gitem">${esc(it.name)}</div>`).join('');
  const gbtn=document.getElementById('g-btn'); gbtn.textContent=gi.btnText||''; gbtn.href=gi.url||'#';
}

let _jpIdx=0, _ivIdx=0;
function openJobP(i){ _jpIdx=i; switchTab('jp',i); openP('jp-ov'); }
function openIvP(i){ _ivIdx=i; switchTab('iv',i); openP('iv-ov'); }

render();
</script>
</body>
